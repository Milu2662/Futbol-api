name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Construir, publicar y desplegar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y publicar la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/futbol-api:latest

      - name: Disparar redeploy en Azure App Service
        env:
          KUDU_USER: ${{ secrets.AZURE_KUDU_USERNAME }}
          KUDU_PASS: ${{ secrets.AZURE_KUDU_PASSWORD }}
        run: |
          HTTP_CODE=$(curl -X POST "https://futbol-api-milu2662.scm.azurewebsites.net/docker/hook" \
            -u "${KUDU_USER}:${KUDU_PASS}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            -s -o /dev/null -w "%{http_code}")
          echo "Azure respondio con codigo: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "ERROR: Azure rechazo la solicitud de redeploy."
            exit 1
          fi