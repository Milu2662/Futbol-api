name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Construir, publicar y desplegar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y publicar la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/futbol-api:latest

      - name: Disparar redeploy en Azure App Service
        run: |
          curl -X POST "https://futbol-api-milu2662.scm.azurewebsites.net/docker/hook" \
            -u "${{ secrets.AZURE_KUDU_USERNAME }}:${{ secrets.AZURE_KUDU_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            -i