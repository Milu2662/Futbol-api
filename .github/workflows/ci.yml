name: CI Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Correr tests con pytest
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/dummy_db
        run: |
          cd backend
          python -m pytest -v --tb=short

      - name: Reporte de cobertura
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/dummy_db
        run: |
          cd backend
          python -m pytest --cov=app --cov-report=term-missing