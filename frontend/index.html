<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuadrangular de Fútbol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="matchday-header">
      <p class="eyebrow">Cuadrangular · Todos contra todos</p>
      <h1>Centro de control del torneo</h1>
    </header>

    <nav class="tab-strip" id="tab-strip" role="tablist">
      <button class="tab-btn active" data-tab="marcadores" role="tab" aria-selected="true">Marcadores</button>
      <button class="tab-btn" data-tab="tabla" role="tab" aria-selected="false">Tabla de posiciones</button>
      <button class="tab-btn" data-tab="equipos" role="tab" aria-selected="false">Equipos</button>
      <span class="tab-indicator" id="tab-indicator"></span>
    </nav>

    <main>
      <section id="panel-marcadores" class="tab-panel active" role="tabpanel">
        <div class="panel-head">
          <h2>Marcadores</h2>
          <button id="btn-generar-fixture" class="btn btn-gold">Generar fixture</button>
        </div>
        <div id="lista-partidos" class="match-list"></div>
      </section>

      <section id="panel-tabla" class="tab-panel" role="tabpanel">
        <div class="panel-head">
          <h2>Tabla de posiciones</h2>
        </div>
        <div class="table-wrap">
          <table class="standings">
            <thead>
              <tr>
                <th>#</th><th class="al">Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th>
                <th>GF</th><th>GC</th><th>DG</th><th>Pts</th>
              </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
          </table>
        </div>
      </section>

      <section id="panel-equipos" class="tab-panel" role="tabpanel">
        <div class="panel-head">
          <h2>Equipos</h2>
          <div class="panel-head-right">
            <div class="slots" id="slots-equipos" aria-hidden="true"></div>
            <button id="btn-reiniciar-torneo" class="btn btn-danger btn-small">Reiniciar torneo</button>
          </div>
        </div>
        <form id="form-equipo" class="form-inline">
          <input type="text" id="input-nombre-equipo" placeholder="Nombre del equipo" maxlength="100" required>
          <button type="submit" class="btn btn-pitch">Registrar equipo</button>
        </form>
        <ul id="lista-equipos" class="team-list"></ul>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/equipos.js"></script>
  <script src="js/partidos.js"></script>
  <script src="js/tabla.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
